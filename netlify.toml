# Monorepo: install + turbo from repo root. In Netlify UI set:
#   Base directory: (empty)
#   Package directory: apps/web
#   Publish directory: (empty) — required; do not set apps/web or apps/web/apps/web
# If Base is apps/web instead, Package directory must be (empty), never also apps/web.
# https://docs.netlify.com/build/configure-builds/monorepos/

[build]
  command = "pnpm install --frozen-lockfile && pnpm exec turbo run build --filter web"

[build.environment]
  NODE_VERSION = "20"
